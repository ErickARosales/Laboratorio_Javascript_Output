<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <title>Ejercicio 2 -- Demostración de Output en Javascript</title>
    <script> 
            console.log("Imprimiendo mensaje en la consola del navegador mediante Javascript")
            
            function nombre() {
                alert("Erick Aaron Rosales Peña")}
            
            function modificarTexto() {
                document.getElementById("parrafo1").innerHTML="¡Texto actualizado con Javascript!"
            }      
    </script>
  </head>
  <body>
    <h1>Demostración de Output en Javascript</h1>
    <button onclick=nombre()>Mostrar Nombre</button></br>
    <button onclick=modificarTexto()>Agregar texto con Javascript</button>
    <p id="parrafo1"></p>
  </body>
</html>
